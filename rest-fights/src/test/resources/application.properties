# Force gRPC locations client to use plaintext in tests so it can talk to WireMock gRPC (no TLS).
%test.quarkus.grpc.clients.locations.plain-text=true
# Prefer Vert.x-based gRPC client for better compatibility with WireMock gRPC in tests.
%test.quarkus.grpc.clients.locations.use-quarkus-grpc-client=true
